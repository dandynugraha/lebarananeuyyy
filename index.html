<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesan Spesial Dandy 🌙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Quicksand:wght@500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #FFD700;
            --secondary: #fff;
            --bg: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #16213e 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Ornamen Melayang */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: cardEntrance 1s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .emoji-box {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .message-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #text {
            font-size: 16px;
            line-height: 1.6;
            color: #ddd;
        }

        .highlight {
            color: var(--primary);
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            position: relative;
            height: 60px;
        }

        button {
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #yes {
            background: white;
            color: black;
            z-index: 5;
        }

        #yes:hover {
            transform: scale(1.1);
            background: var(--primary);
        }

        #no {
            background: #ff4757;
            color: white;
            position: absolute;
            right: 20px;
            white-space: nowrap;
        }

        /* Success State */
        .success-title {
            font-family: 'Caveat', cursive;
            font-size: 45px !important;
            color: var(--primary) !important;
            -webkit-text-fill-color: initial !important;
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="card" id="mainCard">
            <div class="emoji-box" id="emoji">🥺</div>
            <h1 id="headline">MOHON MAAF LAHIR BATIN</h1>
            
            <div class="message-box">
                <p id="text">
                    Halo! Aku <span class="highlight">Dandy Nugraha</span>.<br>
                    Kalau selama ini aku ada salah yang bikin kamu kesel, sengaja atau nggak... <br>
                    <span class="highlight">Maafin aku ya?</span> 🥺✨
                </p>
            </div>

            <div class="btn-group">
                <button id="yes">IYA, MAAFIN ✨</button>
                <button id="no">ENGGAK! 😤</button>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const text = document.getElementById('text');
        const emoji = document.getElementById('emoji');
        const mainCard = document.getElementById('mainCard');
        const bgm = document.getElementById('bgm');

        // Play Music on first click
        document.body.addEventListener('click', () => {
            bgm.play().catch(() => {});
        }, { once: true });

        const jokes = [
            "Yakin nih? 😢",
            "Dandy nangis loh.. 😭",
            "Tega banget sih.. 💔",
            "Plisss maafin Dandy ✨",
            "Nanti THR-nya hangus loh! 💸",
            "Yah, kok ditolak? 😔",
            "Gak bakal bisa keklik wlee! 😜"
        ];

        const emojis = ["🥺", "😔", "😭", "😢", "😩"];

        function moveButton() {
            // Kalkulasi posisi random yang tetap aman di layar
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.style.zIndex = "999";

            // Ganti teks dan emoji secara acak
            text.innerHTML = jokes[Math.floor(Math.random() * jokes.length)];
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        }

        // Event buat Desktop & Mobile
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            // Efek Confetti
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) return clearInterval(interval);
              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Ganti isi Card
            mainCard.innerHTML = `
                <div style="animation: float 2s infinite">
                    <div style="font-size: 80px">💖</div>
                    <h1 class="success-title">Yeayy! Makasih!</h1>
                    <p style="font-size: 18px; color: white;">
                        Kamu emang yang terbaik! <br>
                        Sekarang Dandy tenang lahir batin. <br><br>
                        <span style="color: var(--primary)">Selamat Lebaran! 🌙</span>
                    </p>
                    <button onclick="location.reload()" style="margin-top:20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid white;">Main Lagi</button>
                </div>
            `;
        });

        // Efek Partikel Sederhana di Background
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'white';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            star.style.borderRadius = '50%';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
