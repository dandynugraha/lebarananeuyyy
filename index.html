<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesan Dari Dandy 🌙</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgm" loop>
  <source src="lagu.mp3" type="audio/mpeg">
</audio>

<div class="stars"></div> <div class="container">
  <div class="card">
    <div class="icon-header">🕌</div>
    <h1>Mohon Maaf Lahir Batin</h1>
    <div class="divider"></div>

    <div class="content-box">
      <p id="text">
        Halo Orang Baik! ✨<br><br>
        Aku, <b>Muhammad Dandy Nugraha</b> mau bilang...
        <br><br>
        Kalau selama ini aku ada salah yang disengaja maupun gak sengaja (tapi kayaknya gak ada sih karena aku kan idaman), <br><br>
        Plis, maafin aku ya? 🥺
      </p>
    </div>

    <h2 class="question">Maafin Dandy gak?</h2>

    <div class="buttons">
      <button id="yes">Iya, Maafin ✨</button>
      <button id="no">Enggak! 🏃‍♂️</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
