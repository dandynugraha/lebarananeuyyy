<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maaf Dari Dandy 🌙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-gold: #FFD700;
            --bg: #030305;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #16213e 0%, transparent 40%);
            /* FIX HP: Menggunakan dvh agar tidak kepotong address bar browser */
            min-height: 100dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden; /* Mencegah scroll ke samping */
            color: white;
            padding: 20px;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; /* Ukuran lebih pas di HP */
            margin-bottom: 20px;
            color: var(--neon-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            line-height: 1.2;
        }

        .message-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #text {
            font-size: 1rem;
            line-height: 1.5;
            color: #efefef;
        }

        /* Tombol Layout */
        .btn-group {
            display: flex;
            flex-direction: column; /* Tombol susun atas bawah di HP biar lega */
            align-items: center;
            gap: 15px;
            position: relative;
            min-height: 120px;
        }

        button {
            width: 100%; /* Full width di HP biar jempol gampang klik */
            max-width: 280px;
            padding: 15px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        #yes {
            background: white;
            color: black;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        #no {
            background: #ff4757;
            color: white;
            z-index: 5;
            /* Default position di awal */
            position: relative; 
        }

        /* Styling Sukses */
        .success-content h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            text-transform: none;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.2rem; }
            .btn-group { flex-direction: row; } /* Di laptop tetap sampingan */
            button { width: auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="mainContent">
            <h1>SISTEM MAAF<br>DANDY v3.0</h1>
            
            <div class="message-container">
                <p id="text">
                    Halo Orang Baik! Aku <b>Dandy Nugraha</b>. 
                    Kalau aku ada salah (banyak kayaknya), dimaafin ya? 🙏✨<br><br>
                    <i>Plis tekan tombol di bawah...</i>
                </p>
            </div>

            <div class="btn-group">
                <button id="yes">IYA, MAAFIN ✨</button>
                <button id="no">ENGGAK! 😤</button>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const text = document.getElementById('text');
        const mainContent = document.getElementById('mainContent');
        const bgm = document.getElementById('bgm');

        document.body.addEventListener('click', () => {
            bgm.play().catch(() => {});
        }, { once: true });

        const trolls = [
            "Yakin nih? 😢",
            "Yah, tombolnya kabur! 🏃‍♂️",
            "Klik 'IYA' aja kenapa..",
            "Eits, gak bisa! 😜",
            "pliss! 😭"
        ];

        function moveButton() {
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = "999";
            
            // Jarak aman dari pinggir layar (50px)
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 100) + 50;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            text.innerHTML = `<b>[ERROR]</b> ${trolls[Math.floor(Math.random() * trolls.length)]}`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            mainContent.innerHTML = `
                <div class="success-content" style="animation: bounce 1s">
                    <div style="font-size: 5rem;">🚀💖</div>
                    <h1>Makasih Ya!</h1>
                    <p style="font-size: 1.2rem; margin-top:15px;">
                        Sekarang saya tenang lahir batin.<br><br>
                        <span style="color: var(--neon-gold);">SELAMAT LEBARAN! 🌙</span>
                    </p>
                    <button onclick="location.reload()" style="margin-top:30px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2);">Ulangi</button>
                </div>
            `;
        });
    </script>
</body>
</html>
