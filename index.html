<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebaran Nihhh 🌙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@400;700;900&family=Caveat:wght@700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-gold: #FFD700;
            --error-red: #ff4757;
            --bg: #030305;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, #16213e 0%, transparent 40%);
            min-height: 100dvh; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: white;
            padding: 20px;
        }

        /* Animasi Lampion Blur */
        .lampion {
            position: absolute;
            top: -20px;
            font-size: 40px;
            filter: blur(2px);
            opacity: 0.6;
            animation: swing 3s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes swing {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Judul Efek Cahaya */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--neon-gold), 0 0 20px #ffa500;
            animation: pulse 2s infinite;
            line-height: 1.4;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); text-shadow: 0 0 30px var(--neon-gold); }
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            display: block;
            margin-top: 10px;
        }

        .message-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 25px;
            padding: 30px 20px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #efefef;
        }

        /* Styling Error Merah */
        .err-msg {
            color: var(--error-red);
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            min-height: 120px;
        }

        button {
            width: 100%;
            max-width: 280px;
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yes {
            background: white;
            color: black;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        #no {
            background: var(--error-red);
            color: white;
            z-index: 5;
            position: relative;
        }

        .success-content h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            text-transform: none;
        }

        @media (min-width: 600px) {
            h1 { font-size: 2rem; }
            .btn-group { flex-direction: row; justify-content: center; }
            button { width: auto; min-width: 180px; }
        }
    </style>
</head>
<body>

    <div class="lampion" style="left: 10%;">🏮</div>
    <div class="lampion" style="right: 15%; animation-delay: 1s; font-size: 30px;">🏮</div>
    <div class="lampion" style="left: 40%; animation-delay: 2s; font-size: 25px;">🏮</div>

    <div class="container">
        <div id="mainContent">
            <h1>SELAMAT LEBARAN DULURS<br><span class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</span></h1>
            
            <div class="message-container">
                <p id="text">
                    Halo People Bikee! saya <b>Dandy</b>. 
                    Mohon pliss maaf atas semua my kesalahan saya yaa 🙏✨<br><br>
                    <i>Dimaafin kan????</i>
                </p>
            </div>

            <div class="btn-group">
                <button id="yes">IYA, MAAFIN ✨</button>
                <button id="no">ENGGAK! 😤</button>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const text = document.getElementById('text');
        const mainContent = document.getElementById('mainContent');
        const bgm = document.getElementById('bgm');

        document.body.addEventListener('click', () => {
            bgm.play().catch(() => {});
        }, { once: true });

        const trolls = [
            "Yakin nih? 😢",
            "Yah, tombolnya kabur! 🏃‍♂️",
            "Klik 'IYA' aja kenapa..",
            "Eits, gak bisa! 😜",
            "Nyerah aja, pliss! 😭"
        ];

        function moveButton() {
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = "999";
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 100) + 50;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // Teks Error jadi MERAH
            text.innerHTML = `<span class="err-msg">[ERROR]</span> ${trolls[Math.floor(Math.random() * trolls.length)]}`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFD700', '#ffffff', '#00ff00']
            });

            mainContent.innerHTML = `
                <div class="success-content" style="animation: bounce 1s">
                    <div style="font-size: 5rem;">🚀💖</div>
                    <h1>Nuhun Pisan Euyy!</h1>
                    <p style="font-size: 1.2rem; margin-top:15px; color: #ddd;">
                        Sekarang saya tenang lahir batin nih.<br><br>
                        <span style="color: var(--neon-gold); font-weight: bold;">SELAMAT LEBARAN! 🌙</span>
                    </p>
                    <button onclick="location.reload()" style="margin-top:30px; background:var(--neon-gold); color:black;">Kalo mau ngasih THR kabarin yee 💸</button>
                </div>
            `;
        });
    </script>
</body>
</html>
