<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permintaan Maaf v3.1 (Edisi Jahil) 🌙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Montserrat:wght@900&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --emerald: #008080;
            --gold: #FFD700;
            --bg: #f0f4f3;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            /* Pola Latar Belakang Islami Samar */
            background-image: url('https://www.transparenttextures.com/patterns/az-subtle.png');
            min-height: 100dvh; /* FIX HP: Agar tidak kepotong */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: #333;
            padding: 15px;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tulisan Arab */
        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--emerald);
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            line-height: 1.5;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #333;
            text-transform: uppercase;
        }

        .msg-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        #text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
        }

        .highlight {
            color: var(--emerald);
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            flex-direction: column; /* HP Friendly: Susun kebawah di awal */
            gap: 12px;
            position: relative;
            align-items: center;
            height: 120px; /* Ruang vertikal ekstra untuk tombol lari */
        }

        button {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s cubic-bezier(0.19, 1, 0.22, 1); /* Transisi cepat */
        }

        #yes {
            background: var(--emerald);
            color: white;
            z-index: 10;
        }

        #yes:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 128, 128, 0.3);
        }

        /* Tombol Ngeselin - Tetap Lari-lari */
        #no {
            background: #ff4757;
            color: white;
            z-index: 5;
            position: relative; /* Akan berubah jadi fixed di JS saat interaksi */
        }

        /* Tampilan Sukses */
        .success-mode h1 {
            font-size: 2.5rem;
            color: var(--emerald);
        }

        @media (min-width: 600px) {
            .btn-group { flex-direction: row; justify-content: center; height: 60px; }
            button { width: auto; min-width: 160px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="mainCard">
            <div class="arabic">تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ</div>
            <h1>MOHON MAAF LAHIR BATIN</h1>
            
            <div class="msg-box">
                <p id="text">
                    Halo Orang Baik! Aku <span class="highlight">Dandy Nugraha</span>.<br>
                    Kalau selama ini aku ada salah yang disengaja maupun nggak... <br>
                    <span class="highlight">Maafin aku ya?</span> 🥺✨
                </p>
            </div>

            <div class="btn-group">
                <button id="yes">IYA, MAAFIN ✨</button>
                <button id="no">ENGGAK! 😤</button>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const text = document.getElementById('text');
        const mainCard = document.getElementById('mainCard');
        const bgm = document.getElementById('bgm');

        // Play Music on first click
        document.body.addEventListener('click', () => {
            bgm.play().catch(() => {});
        }, { once: true });

        // TULISAN NGESELIN (Mengejek)
        const trolling = [
            "Eits, gak kena wlee! 😜",
            "Yah, tombolnya kabur.. 🏃‍♂️",
            "Nyerah aja, mending 'IYA' 😂",
            "Coba klik lagi deh.. 😉",
            "Tega banget sama Dandy.. 😭",
            "Sistem menolak aksi 'GAK'!"
        ];

        function moveButton() {
            // Ubah ke position fixed agar lari ke seluruh layar
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = "999";
            
            // Kalkulasi posisi random super cepat
            const padding = 20; // Jarak aman dari pinggir layar
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2) + padding;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            // GANTI TULISAN NGESELIN
            text.innerHTML = `<span style="color:#ff4757; font-weight:700;">[ERROR]</span><br>${trolling[Math.floor(Math.random() * trolling.length)]}`;
        }

        // Lari saat didekati (desktop) atau disentuh (mobile)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Cegah klik asli di mobile
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            // Selebrasi Confetti Mewah
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#008080', '#ffffff', '#FFD700']
            });

            mainCard.innerHTML = `
                <div class="success-mode" style="animation: fadeIn 1s">
                    <div style="font-size: 5rem; margin-bottom:10px;">🌙✨</div>
                    <h1 style="font-family:'Amiri'; font-size:2.5rem; margin-bottom:5px;">Makasih Ya!</h1>
                    <p style="font-size: 1.1rem; color:#555; margin-bottom:20px;">
                        Semoga ibadah kita diterima Allah SWT.<br>
                        Dandy dimaafin lahir batin.
                        <br><br>
                        <b>Selamat Idul Fitri!</b>
                    </p>
                    <button onclick="location.reload()" style="background:rgba(0,128,128,0.1); color:var(--emerald); border:1px solid rgba(0,128,128,0.2); width:auto; padding:10px 30px;">Kembali</button>
                </div>
            `;
        });
    </script>
</body>
</html>
