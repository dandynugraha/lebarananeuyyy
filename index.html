<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pesan Spesial Dandy 🌙</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Quicksand:wght@500;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #FFD700;
            --secondary: #fff;
            --bg: #0a0a0b;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #16213e 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-box {
            font-size: 70px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            margin-bottom: 15px;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .message-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 100px;
        }

        #text {
            font-size: 16px;
            line-height: 1.6;
            color: #eee;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
            height: 80px; /* Ruang ekstra agar tombol lari tidak menabrak */
        }

        button {
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yes {
            background: white;
            color: black;
            z-index: 10;
            position: relative;
        }

        #no {
            background: #ff4757;
            color: white;
            z-index: 5;
            position: relative; /* Berubah ke fixed via JS saat interaksi */
        }

        .success-content h1 {
            font-family: 'Caveat', cursive;
            font-size: 45px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="mainCard">
            <div class="emoji-box" id="emoji">🥺</div>
            <h1 id="headline">MOHON MAAF LAHIR BATIN</h1>
            
            <div class="message-box">
                <p id="text">
                    Halo! Aku <b>Dandy Nugraha</b>.<br>
                    Kalau aku ada salah yang disengaja atau nggak... <br>
                    <b>Maafin aku ya?</b> ✨
                </p>
            </div>

            <div class="btn-group">
                <button id="yes">IYA, MAAFIN ✨</button>
                <button id="no">ENGGAK! 😤</button>
            </div>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const text = document.getElementById('text');
        const emoji = document.getElementById('emoji');
        const mainCard = document.getElementById('mainCard');
        const bgm = document.getElementById('bgm');

        // Play Musik
        document.body.addEventListener('click', () => {
            bgm.play().catch(() => {});
        }, { once: true });

        const jokes = [
            "Tega banget sih.. 😭",
            "Dandy nangis loh.. 😭",
            "Yakin nih? 😢",
            "Nanti THR-nya hangus! 💸",
            "Gak bakal bisa keklik wlee! 😜",
            "Yah, kok ditolak? 😔"
        ];

        const emojis = ["🥺", "😭", "😢", "😔", "😤"];

        function moveButton() {
            // Ubah ke fixed hanya saat mulai lari
            noBtn.style.position = 'fixed';
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.style.zIndex = "999";

            text.innerHTML = jokes[Math.floor(Math.random() * jokes.length)];
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            // Ledakan Konfeti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            mainCard.innerHTML = `
                <div class="success-content">
                    <div style="font-size: 80px; animation: float 2s infinite">💖</div>
                    <h1>Yeayy! Makasih!</h1>
                    <p style="font-size: 18px; margin-top:10px;">
                        Kamu emang yang terbaik!<br>
                        Sekarang Dandy tenang lahir batin.<br><br>
                        <span style="color: #FFD700">Selamat Lebaran! 🌙</span>
                    </p>
                    <button onclick="location.reload()" style="margin-top:25px; background:rgba(255,255,255,0.1); color:white; border:1px solid white;">Main Lagi</button>
                </div>
            `;
        });
    </script>
</body>
</html>
